<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Link Library</title>
  <link rel="stylesheet" href="style.css">
  <!-- SortableJS for drag-and-drop -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body>
  <h1>Link Library</h1>

  <!-- Add Link Form -->
  <div id="addLinkForm">
    <input type="text" id="linkName" placeholder="Name">
    <input type="url" id="linkURL" placeholder="URL">
    <input type="text" id="linkCategory" placeholder="Category">
    <button id="addBtn">Add Link</button>
  </div>

  <!-- Search Box -->
  <input type="text" id="searchBox" placeholder="Search links...">

  <!-- Container for links -->
  <div id="linkContainer"></div>

  <script src="script.js"></script>
</body>
</html>
